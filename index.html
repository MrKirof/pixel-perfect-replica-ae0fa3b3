<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

    <title>Kirof — Design, Development & Financial Services</title>
    <meta name="description" content="Remote-first creative agency with 20 specialists across 13 disciplines. 1500+ clients worldwide. Brand design, web development, motion graphics, and digital marketing." />
    <meta name="keywords" content="creative agency, brand design, web development, UI/UX design, motion graphics, digital marketing, explainer videos, remote agency" />
    <meta name="author" content="Kirof" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://kirof.com/" />
    <link rel="icon" href="/favicon.ico" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Kirof" />
    <meta property="og:title" content="Kirof — Design, Development & Financial Services" />
    <meta property="og:description" content="Remote-first creative agency with 20 specialists across 13 disciplines. 1500+ clients worldwide." />
    <meta property="og:url" content="https://kirof.com/" />
    <meta property="og:image" content="https://kirof.com/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@kirof" />
    <meta name="twitter:title" content="Kirof — Design, Development & Financial Services" />
    <meta name="twitter:description" content="Remote-first creative agency with 20 specialists across 13 disciplines. 1500+ clients worldwide." />
    <meta name="twitter:image" content="https://kirof.com/og-image.jpg" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Kirof",
      "url": "https://kirof.com",
      "logo": "https://kirof.com/favicon.ico",
      "description": "Remote-first creative agency with 20 specialists across 13 disciplines delivering design, development, and financial services.",
      "foundingDate": "2013",
      "founder": {
        "@type": "Person",
        "name": "Mareful Kirof"
      },
      "numberOfEmployees": {
        "@type": "QuantitativeValue",
        "value": 20
      },
      "sameAs": [
        "https://www.behance.net/kirof",
        "https://www.linkedin.com/company/kirof"
      ],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "email": "hello@kirof.com"
      },
      "areaServed": "Worldwide",
      "serviceType": ["Brand Design", "UI/UX Design", "Web Development", "Motion Graphics", "Explainer Videos", "Video Production", "Digital Marketing", "Graphic Design"]
    }
    </script>

    <!-- LocalBusiness for services -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Kirof",
      "url": "https://kirof.com",
      "priceRange": "$$",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "reviewCount": "500",
        "bestRating": "5"
      }
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
